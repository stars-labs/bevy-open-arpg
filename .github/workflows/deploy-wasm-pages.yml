name: Build, Release, and Deploy WebGPU

# Flow: build the wasm bundle -> publish it as a GitHub Release asset ->
# deploy to GitHub Pages FROM that release asset. Pages therefore always serves
# exactly what was released, and every deploy has a downloadable, versioned record.
#
# Triggers:
#   - push to main         -> rolling "web-latest" prerelease + deploy to Pages
#   - push tag v*          -> versioned web + native release bundles + deploy to Pages
#   - workflow_dispatch    -> explicit tag release (release_type=tag + release_tag=v*)
#                            or web-latest preview (release_type=preview)
#   - pull_request         -> build only (no release, no deploy)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Optional ref for preview release checkout (defaults to the current branch/ref)."
        required: false
        default: ""
      release_tag:
        description: "Manual run tag when release_type=tag (must start with v)"
        required: false
        default: ""
      release_type:
        description: "Whether this run is a preview or a tagged release"
        required: false
        type: choice
        options:
          - preview
          - tag
        default: preview

concurrency:
  group: bevy-open-arpg-pages-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  APP_NAME: bevy-open-arpg

jobs:
  build-web:
    name: Build WebAssembly package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'tag' && github.event.inputs.release_tag || (github.event.inputs.checkout_ref != '' && github.event.inputs.checkout_ref) || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false

      - name: Cache wasm tool binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-opt
          key: ${{ runner.os }}-wasm-tools-${{ hashFiles('scripts/build_web.sh', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-tools-

      # The fat-LTO release link peaks past the runner's RAM — without swap
      # the VM gets OOM-terminated mid-link (SIGTERM/exit 143).
      - name: Add swap for the fat-LTO link
        run: |
          sudo fallocate -l 12G /mnt/extra-swap
          sudo chmod 600 /mnt/extra-swap
          sudo mkswap /mnt/extra-swap
          sudo swapon /mnt/extra-swap
          free -h

      - name: Build web artifacts
        # build_web.sh pins the wasm-bindgen CLI to the Cargo.lock version and
        # downloads binaryen itself, so no extra tool install is needed.
        run: bash scripts/build_web.sh

      - name: Package web bundle
        run: |
          set -euo pipefail
          mkdir -p artifacts
          (cd web && zip -r -q ../artifacts/web-dist.zip .)
          sha256sum artifacts/web-dist.zip > artifacts/web-dist.zip.sha256
          ls -la artifacts/web-dist.zip
          sha256sum artifacts/web-dist.zip

      - name: Build web release manifest
        run: |
          set -euo pipefail
          web_hash="$(cut -d' ' -f1 artifacts/web-dist.zip.sha256)"
          web_size="$(stat -c %s artifacts/web-dist.zip)"
          web_sha_hash="$(sha256sum artifacts/web-dist.zip.sha256 | awk '{print $1}')"
          manifest_size="$(stat -c %s artifacts/web-dist.zip.sha256)"
          {
            echo "artifact,sha256,size_bytes"
            printf 'web-dist.zip,%s,%s\n' "$web_hash" "$web_size"
            printf 'web-dist.zip.sha256,%s,%s\n' "$web_sha_hash" "$manifest_size"
            echo "run_ref,${{ github.sha }},0"
          } > artifacts/web-release-manifest.csv

      - name: Upload web bundle (passes the build between jobs)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: |
            artifacts/web-dist.zip
            artifacts/web-dist.zip.sha256
            artifacts/web-release-manifest.csv
          if-no-files-found: error
          retention-days: 7

  build-native:
    name: Build native release bundles
    # Native artifacts are only packaged on tagged releases so normal main pushes
    # stay light and quick while versioned releases remain fully reproducible.
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'tag' && startsWith(github.event.inputs.release_tag, 'v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            binary_ext: ""
            package_type: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            binary_ext: ".exe"
            package_type: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            binary_ext: ""
            package_type: tar.gz
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    env:
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'tag' && github.event.inputs.release_tag || (github.event.inputs.checkout_ref != '' && github.event.inputs.checkout_ref) || github.ref }}
      RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'tag' && github.event.inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false

      - name: Build native release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package native release artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import os
          import shutil
          import tarfile
          import zipfile
          from pathlib import Path

          APP_NAME = os.environ["APP_NAME"]
          VERSION = os.environ["VERSION"]
          PLATFORM = os.environ["PLATFORM"]
          TARGET = os.environ["TARGET"]
          BINARY_EXT = os.environ["BINARY_EXT"]
          PACKAGE_TYPE = os.environ["PACKAGE_TYPE"]
          output = Path.cwd()

          binary_name = f"{APP_NAME}{BINARY_EXT}"
          binary_path = Path("target") / TARGET / "release" / binary_name
          if not binary_path.is_file():
            raise SystemExit(f"missing native binary: {binary_path}")

          artifact_name = f"{APP_NAME}-{VERSION}-{PLATFORM}.{PACKAGE_TYPE}"
          artifact_path = output / artifact_name
          sha_name = artifact_path.with_suffix(artifact_path.suffix + ".sha256")
          package_dir = Path("release-package")
          staging_dir = package_dir / f"{APP_NAME}-{PLATFORM}"
          staging_dir.mkdir(parents=True, exist_ok=True)
          staging = [binary_path, Path("README.md"), Path("Cargo.toml")]

          for src in staging:
            if not src.is_file():
              raise SystemExit(f"missing staging file: {src}")
            shutil.copy2(src, staging_dir / src.name)

          staging_items = sorted(staging_dir.iterdir())
          if not staging_items:
            raise SystemExit("missing staging files")

          if PACKAGE_TYPE == "zip":
            with zipfile.ZipFile(artifact_path, "w", zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              for item in staging_items:
                zf.write(item, arcname=item.name)
          elif PACKAGE_TYPE == "tar.gz":
            with tarfile.open(artifact_path, "w:gz") as tf:
              for item in staging_items:
                tf.add(item, arcname=item.name)
          else:
            raise SystemExit(f"Unsupported package type: {PACKAGE_TYPE}")

          hasher = hashlib.sha256()
          hasher.update(artifact_path.read_bytes())
          sha_name.write_text(f"{hasher.hexdigest()}  {artifact_path.name}\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"artifact_name={artifact_name}\n")
            out.write(f"artifact_path={artifact_path}\n")
            out.write(f"sha_path={sha_name}\n")
          PY
        env:
          APP_NAME: ${{ env.APP_NAME }}
          VERSION: ${{ env.RELEASE_TAG_NAME }}
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
          BINARY_EXT: ${{ matrix.binary_ext }}
          PACKAGE_TYPE: ${{ matrix.package_type }}

      - name: Upload native release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bevy-open-arpg-native-${{ env.RELEASE_TAG_NAME }}-${{ matrix.platform }}-${{ github.sha }}
          path: |
            ${{ steps.package.outputs.artifact_path }}
            ${{ steps.package.outputs.sha_path }}
          if-no-files-found: error
          retention-days: 7

  release-web:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-web
      - build-native
    # Keep release publishing alive for preview builds when native is intentionally skipped,
    # but still fail closed for native release requests if native builds fail.
    if: github.event_name != 'pull_request' &&
      needs['build-native'].result != 'failure' &&
      needs['build-native'].result != 'cancelled'
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Determine release tag
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_type="${{ github.event.inputs.release_type }}"
            release_tag="${{ github.event.inputs.release_tag }}"

            if [[ "${release_type}" == "tag" ]]; then
              if [[ "${release_tag}" != v* ]]; then
                echo "error: release_type=tag requires release_tag to start with 'v' (e.g. v0.1.0)." >&2
                exit 1
              fi
              echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              if [[ -n "${release_tag}" ]]; then
                echo "warning: release_type=preview ignores release_tag=${release_tag}." >&2
              fi
              echo "tag=web-latest" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "is_tag_release=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=web-latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: .

      - name: Download native bundle on tagged release
        if: steps.meta.outputs.is_tag_release == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: bevy-open-arpg-native-${{ steps.meta.outputs.tag }}-*
          path: .
          merge-multiple: true

      - name: Build release asset list
        id: assets
        run: |
          set -euo pipefail
          asset_list="release-assets.txt"
          release_body="release-body.md"
          : > "$asset_list"
          : > "$release_body"

          append() {
            [ -f "$1" ] && printf '%s\n' "$1" >> "$asset_list"
          }

          append "web-dist.zip"
          append "web-dist.zip.sha256"
          append "web-release-manifest.csv"
          if [[ "${{ steps.meta.outputs.is_tag_release }}" == "true" ]]; then
            for f in "${{ env.APP_NAME }}-${{ steps.meta.outputs.tag }}"-*; do
              append "$f"
            done
          fi

          # Emit a stable checksum/size manifest for every attached artifact.
          # This mirrors the Bevy release metadata pattern for end-to-end reproducibility.
          checksum_manifest="release-asset-manifest.csv"
          printf 'artifact,sha256,size_bytes\n' > "$checksum_manifest"
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            if [ ! -f "$asset" ]; then
              echo "warning: release asset missing from workspace: ${asset}" >&2
              continue
            fi
            asset_sha="$(sha256sum "$asset" | awk '{print $1}')"
            asset_size="$(stat -c %s "$asset")"
            printf '%s,%s,%s\n' "$asset" "$asset_sha" "$asset_size" >> "$checksum_manifest"
          done < "$asset_list"

          if [[ "${{ steps.meta.outputs.is_tag_release }}" == "true" ]]; then
            required_native=(
              "${APP_NAME}-${{ steps.meta.outputs.tag }}-linux-x86_64.tar.gz"
              "${APP_NAME}-${{ steps.meta.outputs.tag }}-windows-x86_64.zip"
              "${APP_NAME}-${{ steps.meta.outputs.tag }}-macos-x86_64.tar.gz"
            )
            for native_asset in "${required_native[@]}"; do
              if [ ! -f "$native_asset" ]; then
                echo "error: required native artifact missing for tagged release: ${native_asset}" >&2
                exit 1
              fi
            done
          fi

          release_type="${{ steps.meta.outputs.is_tag_release }}"
          if [[ "$release_type" == "true" ]]; then
            release_kind="versioned release"
          else
            release_kind="web preview (rolling)"
          fi

          {
            echo "## bevy-open-arpg ${{ steps.meta.outputs.tag }}"
            echo
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- release type: $release_kind"
            echo "- web bundle: \`web-dist.zip\`"
            if [[ "${{ steps.meta.outputs.is_tag_release }}" == "true" ]]; then
              echo "- native bundles: \`linux-x86_64\`, \`windows-x86_64\`, \`macos-x86_64\`"
            fi
            echo
            echo "## Release Artifacts"
            echo
            echo "| Artifact | SHA-256 | Size (bytes) |"
            echo "| --- | ---: | ---: |"

            while IFS=, read -r artifact hash size; do
              [ -n "$artifact" ] || continue
              if [[ "$artifact" == "artifact" ]]; then
                continue
              fi
              printf "| %s | %s | %s |\n" "$artifact" "$hash" "$size"
            done < "$checksum_manifest"
          } > "$release_body"

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          cat "$asset_list" >> "$GITHUB_OUTPUT"
          echo "$checksum_manifest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body_path=$release_body" >> "$GITHUB_OUTPUT"
          if [ -s "$asset_list" ]; then
            echo "Release assets:"
            cat "$asset_list"
          fi
          echo "Release checksums:"
          cat "$checksum_manifest"

      - name: Publish release with the web bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Web build ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          overwrite_files: true
          # Move the rolling tag to the current commit on main pushes.
          target_commitish: ${{ github.sha }}
          files: ${{ steps.assets.outputs.files }}
          body_path: ${{ steps.assets.outputs.body_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    name: Deploy to GitHub Pages from release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-web
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download released bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-web.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern web-dist.zip \
            --output web-dist.zip \
            --clobber
          mkdir -p web-dist
          unzip -q -o web-dist.zip -d web-dist
          ls -la web-dist
          # Keep the page root clean for deploy-pages.
          find web-dist -maxdepth 1 -type f \( -name '.gitkeep' -o -name '.nojekyll' \) -delete || true

      - name: Upload Pages bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
