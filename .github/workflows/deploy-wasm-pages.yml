name: Build, Release, and Deploy WebGPU

# Flow: build the wasm bundle -> publish it as a GitHub Release asset ->
# deploy to GitHub Pages FROM that release asset. Pages therefore always serves
# exactly what was released, and every deploy has a downloadable, versioned record.
#
# Triggers:
#   - push to main         -> rolling "web-latest" prerelease + deploy to Pages
#   - push tag v*          -> versioned web + linux release + deploy to Pages
#   - pull_request         -> build only (no release, no deploy)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag for a manual run (defaults to web-latest)"
        required: false
        default: ""

concurrency:
  group: bevy-open-arpg-pages-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  APP_NAME: bevy-open-arpg

jobs:
  build-web:
    name: Build WebAssembly package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false

      - name: Cache wasm tool binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-opt
          key: ${{ runner.os }}-wasm-tools-${{ hashFiles('scripts/build_web.sh') }}
          restore-keys: |
            ${{ runner.os }}-wasm-tools-

      # The fat-LTO release link peaks past the runner's RAM — without swap
      # the VM gets OOM-terminated mid-link (SIGTERM/exit 143).
      - name: Add swap for the fat-LTO link
        run: |
          sudo fallocate -l 12G /mnt/extra-swap
          sudo chmod 600 /mnt/extra-swap
          sudo mkswap /mnt/extra-swap
          sudo swapon /mnt/extra-swap
          free -h

      - name: Build web artifacts
        # build_web.sh pins the wasm-bindgen CLI to the Cargo.lock version and
        # downloads binaryen itself, so no extra tool install is needed.
        run: bash scripts/build_web.sh

      - name: Package web bundle
        run: |
          set -euo pipefail
          mkdir -p artifacts
          (cd web && zip -r -q ../artifacts/web-dist.zip .)
          sha256sum artifacts/web-dist.zip > artifacts/web-dist.zip.sha256
          ls -la artifacts/web-dist.zip
          sha256sum artifacts/web-dist.zip

      - name: Build web release manifest
        run: |
          set -euo pipefail
          web_hash="$(cut -d' ' -f1 artifacts/web-dist.zip.sha256)"
          web_size="$(stat -c %s artifacts/web-dist.zip)"
          web_sha_hash="$(sha256sum artifacts/web-dist.zip.sha256 | awk '{print $1}')"
          manifest_size="$(stat -c %s artifacts/web-dist.zip.sha256)"
          {
            echo "artifact,sha256,size_bytes"
            printf 'web-dist.zip,%s,%s\n' "$web_hash" "$web_size"
            printf 'web-dist.zip.sha256,%s,%s\n' "$web_sha_hash" "$manifest_size"
            echo "run_ref,${{ github.sha }},0"
          } > artifacts/web-release-manifest.csv

      - name: Upload web bundle (passes the build between jobs)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: |
            artifacts/web-dist.zip
            artifacts/web-dist.zip.sha256
            artifacts/web-release-manifest.csv
          if-no-files-found: error
          retention-days: 7

  build-native:
    name: Build native Linux release bundle
    # Native artifacts are only packaged on tagged releases so normal main pushes
    # stay light and quick while versioned releases remain fully reproducible.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false

      - name: Build native release binary
        run: cargo build --locked --release

      - name: Package linux release artifact
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BIN_NAME="${{ env.APP_NAME }}-${VERSION}-linux-x86_64.tar.gz"
          SHA_NAME="${BIN_NAME}.sha256"
          mkdir -p release-package
          cp target/release/bevy-open-arpg release-package/
          cp README.md release-package/
          cp Cargo.toml release-package/
          tar -czf "$BIN_NAME" -C release-package bevy-open-arpg README.md Cargo.toml
          sha256sum "$BIN_NAME" > "$SHA_NAME"
          rm -rf release-package
          echo "artifact_name=$BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$PWD/$BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "sha_path=$PWD/$SHA_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload native release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bevy-open-arpg-native-${{ github.ref_name }}
          path: |
            ${{ steps.package.outputs.artifact_path }}
            ${{ steps.package.outputs.sha_path }}
          if-no-files-found: error
          retention-days: 7

  release-web:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-web
      - build-native
    if: github.event_name != 'pull_request'
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: .

      - name: Download native bundle on tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/download-artifact@v4
        with:
          name: bevy-open-arpg-native-${{ github.ref_name }}
          path: .

      - name: Build release asset list
        id: assets
        run: |
          set -euo pipefail
          manifest_file="release-assets.txt"
          : > "$manifest_file"

          append() {
            [ -f "$1" ] && printf '%s\n' "$1" >> "$manifest_file"
          }

          append "web-dist.zip"
          append "web-dist.zip.sha256"
          append "web-release-manifest.csv"

          if [ -f "${{ env.APP_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.gz" ]; then
            append "${{ env.APP_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.gz"
            append "${{ env.APP_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256"
          fi

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          cat "$manifest_file" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -s "$manifest_file" ]; then
            echo "Release assets:"
            cat "$manifest_file"
          fi

      - name: Determine release tag
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=web-latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release with the web bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Web build ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          overwrite_files: true
          # Move the rolling tag to the current commit on main pushes.
          target_commitish: ${{ github.sha }}
          body: |
            WebGPU wasm build for commit ${{ github.sha }}.
            Download `web-dist.zip` for the full Pages bundle.
            On tag releases, also attach `bevy-open-arpg-<tag>-linux-x86_64.tar.gz`
            for a native Linux run bundle.
            Checksums and build manifest are included as companion files.
          files: ${{ steps.assets.outputs.files }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    name: Deploy to GitHub Pages from release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-web
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download released bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-web.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern web-dist.zip \
            --output web-dist.zip \
            --clobber
          mkdir -p web-dist
          unzip -q -o web-dist.zip -d web-dist
          ls -la web-dist
          # Keep the page root clean for deploy-pages.
          find web-dist -maxdepth 1 -type f \( -name '.gitkeep' -o -name '.nojekyll' \) -delete || true

      - name: Upload Pages bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
