name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bevy-open-arpg-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Check formatting
        run: cargo fmt --all -- --check

  build:
    name: Build + Clippy
    runs-on: ubuntu-latest
    needs: [fmt]
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false
      - name: Build all crate features once (lockfile checked)
        run: cargo check --locked --all-features
      - name: Clippy strict
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    needs: [fmt]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false
      - name: Run tests
        run: cargo test --all-features --locked
        # keep test runtime stable across OS by avoiding noisy debug logs
        env:
          RUST_LOG: ""

  wasm:
    name: WebAssembly build
    runs-on: ubuntu-latest
    needs: [fmt]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false
      - name: Check Bevy web feature path
        env:
          RUSTFLAGS: --cfg getrandom_backend="wasm_js"
        run: cargo check --locked --target wasm32-unknown-unknown --no-default-features --features webgpu
      - name: Build wasm bundle
        run: bash scripts/build_web.sh
