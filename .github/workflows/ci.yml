name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bevy-open-arpg-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Clippy + Check
    runs-on: ubuntu-latest
    needs: [fmt]
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false
      - name: Build all crate features once
        run: cargo check --all-features
      - name: Clippy strict
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [fmt]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false
      - name: Run tests
        run: cargo test --all-features

  wasm:
    name: WebAssembly build
    runs-on: ubuntu-latest
    needs: [fmt]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-on-failure: false
      - name: Build wasm bundle
        run: bash scripts/build_web.sh
